<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokerWare - Micro-Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; touch-action: manipulation; }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
        .flash-green { animation: flashG 0.3s; }
        @keyframes flashG { 0% { background-color: #22c55e; } 100% { background-color: transparent; } }
        .flash-red { animation: flashR 0.3s; }
        @keyframes flashR { 0% { background-color: #ef4444; } 100% { background-color: transparent; } }
        
        .card { background: white; color: black; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .spade, .club { color: #1e293b; }
        .heart, .diamond { color: #dc2626; }
        
        #timer-bar { transition: width 0.1s linear; }
    </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col justify-between relative" style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));">

    <!-- OVERLAYS D'ANIMATION (Flashs visuels) -->
    <div id="flash-overlay" class="absolute inset-0 z-0 pointer-events-none"></div>

    <!-- HEADER: SCORE & VIES -->
    <header class="flex justify-between items-center p-3 md:p-4 bg-slate-900 border-b border-slate-700 z-10 shrink-0">
        <div>
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Score</p>
            <p id="score-display" class="text-3xl font-black text-amber-400">0</p>
        </div>
        <div class="text-center">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Mode</p>
            <p id="mode-display" class="text-sm md:text-lg font-black text-emerald-400">NORMAL</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-1">Vies</p>
            <div id="lives-display" class="text-2xl flex gap-1 justify-end">
                <span>❤️</span><span>❤️</span><span>❤️</span>
            </div>
        </div>
    </header>

    <!-- BARRE DE TEMPS (LA PRESSION) -->
    <div class="w-full h-3 md:h-4 bg-slate-800 shrink-0 relative z-10 border-b border-slate-700">
        <div id="timer-bar" class="h-full bg-emerald-500 w-full shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
    </div>

    <!-- ZONE DE JEU DYNAMIQUE -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 relative z-10 w-full max-w-lg mx-auto">
        
        <h2 id="instruction-text" class="text-3xl md:text-5xl font-black text-white uppercase tracking-widest text-center mb-6 drop-shadow-lg"></h2>

        <div id="game-content" class="w-full flex flex-col items-center justify-center min-h-[200px]">
            <!-- Rempli par le JS -->
        </div>

    </main>

    <!-- BOUTONS D'ACTION MASSIFS -->
    <div class="px-2 md:px-4 w-full max-w-lg mx-auto shrink-0 z-10 flex gap-2">
        <button id="btn-left" class="flex-1 h-24 md:h-32 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 rounded-2xl font-black text-2xl md:text-4xl uppercase shadow-[0_6px_0_rgb(67,56,202)] active:shadow-none active:translate-y-1 transition-all">G</button>
        <button id="btn-right" class="flex-1 h-24 md:h-32 bg-pink-600 hover:bg-pink-500 active:bg-pink-700 rounded-2xl font-black text-2xl md:text-4xl uppercase shadow-[0_6px_0_rgb(190,24,93)] active:shadow-none active:translate-y-1 transition-all">D</button>
    </div>

    <!-- ECRAN D'ACCUEIL / GAME OVER -->
    <div id="menu-overlay" class="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-50 backdrop-blur-md p-6 text-center">
        <h1 id="menu-title" class="text-5xl md:text-7xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-600 uppercase italic transform -skew-x-6">PokerWare</h1>
        <p id="menu-subtitle" class="text-lg text-slate-300 mb-8 font-bold">Réfléchissez vite. Très vite.</p>
        
        <div id="stats-box" class="hidden bg-slate-800 p-4 rounded-xl border border-slate-700 mb-8 w-full max-w-xs mx-auto">
            <p class="text-slate-400 text-sm uppercase">Score Final</p>
            <p id="final-score" class="text-4xl font-black text-white">12</p>
            <p id="level-advice" class="hidden mt-3 text-sm font-bold text-emerald-400"></p>
        </div>

        <div class="w-full max-w-sm mb-6">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-3">Mode de jeu</p>
            <div class="grid grid-cols-2 gap-2">
                <button data-mode="training" class="mode-option border-2 rounded-xl p-3 font-black uppercase text-sm">Entraînement</button>
                <button data-mode="beginner" class="mode-option border-2 rounded-xl p-3 font-black uppercase text-sm">Débutant</button>
                <button data-mode="normal" class="mode-option border-2 rounded-xl p-3 font-black uppercase text-sm">Normal</button>
                <button data-mode="expert" class="mode-option border-2 rounded-xl p-3 font-black uppercase text-sm">FNL (insane)</button>
            </div>
            <p id="mode-help" class="text-sm text-slate-300 mt-3 min-h-[2.5rem]"></p>
        </div>

        <button id="btn-start" class="bg-emerald-500 text-slate-900 font-black text-3xl px-12 py-6 rounded-2xl shadow-[0_6px_0_rgb(5,150,105)] hover:translate-y-1 hover:shadow-[0_2px_0_rgb(5,150,105)] active:translate-y-2 active:shadow-none transition-all">▶ JOUER</button>
    </div>

    <script>
        // --- MOTEUR AUDIO (Tone.js) ---
        let synth;
        function initAudio() {
            if (!synth) synth = new Tone.PolySynth(Tone.Synth).toDestination();
        }
        function playSound(type) {
            if (!synth) return;
            try {
                const now = Tone.now();
                if (type === 'tick') synth.triggerAttackRelease("C6", "64n", now, 0.1);
                if (type === 'win') synth.triggerAttackRelease(["C5", "E5", "G5"], "16n", now);
                if (type === 'lose') { synth.triggerAttackRelease("C3", "8n", now); synth.triggerAttackRelease("G2", "4n", now+0.1); }
                if (type === 'speedup') synth.triggerAttackRelease(["C5", "C6"], "8n", now);
            } catch(e){}
        }

        // --- ETAT DU JEU ---
        let score = 0;
        let correctAnswers = 0;
        let minTimerCorrectAnswers = 0;
        let lives = 3;
        let isPlaying = false;
        let currentTimer = 0;
        let maxTime = 4000;
        let timerInterval;
        let currentGame = null;

        const timerBar = document.getElementById('timer-bar');
        const flashOverlay = document.getElementById('flash-overlay');

        const GAME_MODES = {
            training: {
                label: "ENTRAÎNEMENT",
                help: "Sans timer. Les erreurs ne retirent pas de vie.",
                maxTime: null,
                lives: 3,
                timer: false,
                loseLife: false,
                speedEvery: 0,
                speedFactor: 1,
                minTime: null,
                games: ["PotOdds", "SPR", "FlushDraw", "FlopTexture", "StackToBB", "SizingCheck", "TopPair", "PairedBoard", "Overcard", "SuitedHand", "OutsCount"]
            },
            beginner: {
                label: "DÉBUTANT",
                help: "Plus de temps, questions simples pour prendre les réflexes.",
                maxTime: 7000,
                lives: 3,
                timer: true,
                loseLife: true,
                speedEvery: 8,
                speedFactor: 0.90,
                minTime: 1000,
                games: ["FlushDraw", "FlopTexture", "StackToBB", "SizingCheck", "TopPair", "PairedBoard", "SuitedHand"]
            },
            normal: {
                label: "NORMAL",
                help: "Timing initial du jeu : 4 secondes.",
                maxTime: 4000,
                lives: 3,
                timer: true,
                loseLife: true,
                speedEvery: 5,
                speedFactor: 0.85,
                minTime: 1000,
                games: ["PotOdds", "SPR", "FlushDraw", "FlopTexture", "StackToBB", "SizingCheck", "TopPair", "PairedBoard", "Overcard", "SuitedHand", "OutsCount"]
            },
            expert: {
                label: "FNL (insane)",
                help: "Très rapide, brutal, avec tous les mini-jeux.",
                maxTime: 2500,
                lives: 3,
                timer: true,
                loseLife: true,
                speedEvery: 4,
                speedFactor: 0.80,
                minTime: 1000,
                games: ["PotOdds", "SPR", "FlushDraw", "FlopTexture", "StackToBB", "SizingCheck", "TopPair", "PairedBoard", "Overcard", "SuitedHand", "OutsCount"]
            }
        };

        let selectedMode = "normal";
        let currentMode = GAME_MODES[selectedMode];

        const CARD_SUITS = ['spade', 'heart', 'diamond', 'club'];
        const CARD_SYMBOLS = {'spade': '♠', 'heart': '♥', 'diamond': '♦', 'club': '♣'};
        const CARD_RANKS = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        const CARD_VALUES = {'A':14, 'K':13, 'Q':12, 'J':11, 'T':10, '9':9, '8':8, '7':7, '6':6, '5':5, '4':4, '3':3, '2':2};

        function randomItem(items) {
            return items[Math.floor(Math.random() * items.length)];
        }

        function createDeck() {
            const deck = [];
            for (const rank of CARD_RANKS) {
                for (const suit of CARD_SUITS) {
                    deck.push({ rank, suit, val: CARD_VALUES[rank] });
                }
            }
            return deck;
        }

        function shuffle(cards) {
            const copy = [...cards];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function pickAndRemove(deck, predicate = () => true) {
            const indexes = [];
            deck.forEach((card, index) => {
                if (predicate(card)) indexes.push(index);
            });
            const pickedIndex = indexes.length ? randomItem(indexes) : Math.floor(Math.random() * deck.length);
            return deck.splice(pickedIndex, 1)[0];
        }

        function cardHtml(card) {
            return `<div class="card w-16 h-24 text-3xl ${card.suit} border-2 border-slate-200">${card.rank}${CARD_SYMBOLS[card.suit]}</div>`;
        }

        function cardGroupHtml(title, cards) {
            return `
                <div class="w-full bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-widest text-center mb-3">${title}</p>
                    <div class="flex gap-3 justify-center">${cards.map(cardHtml).join('')}</div>
                </div>
            `;
        }

        function rankFromValue(value) {
            return Object.keys(CARD_VALUES).find(rank => CARD_VALUES[rank] === value);
        }

        // --- BIBLIOTHEQUE DES MICRO-JEUX ---
        const microGames = [
            {
                name: "PotOdds",
                instruction: "AS-TU LA COTE ?",
                setup: function() {
                    const pot = Math.floor(Math.random() * 100) + 20;
                    const bet = Math.floor(Math.random() * pot) + 10;
                    const oddsNeeded = bet / (pot + bet + bet);
                    
                    const isWinning = Math.random() > 0.5;
                    let heroEquity = isWinning ? oddsNeeded + (Math.random() * 0.2 + 0.05) : oddsNeeded - (Math.random() * 0.1 + 0.05);
                    heroEquity = Math.max(0.01, Math.min(0.99, heroEquity));

                    const html = `
                        <div class="bg-slate-800 p-4 rounded-xl border-2 border-slate-600 w-full text-center shadow-lg">
                            <p class="text-slate-400 text-sm font-bold uppercase">Pot Initial : <span class="text-white">${pot}</span></p>
                            <p class="text-red-400 text-xl font-black mt-2 uppercase">Mise adverse : ${bet}</p>
                            <div class="mt-4 p-3 bg-slate-900 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold">Ton Équité</p>
                                <p class="text-3xl text-blue-400 font-black">${(heroEquity * 100).toFixed(0)} %</p>
                            </div>
                        </div>
                    `;
                    const explanation = `Cote nécessaire : ${bet} / (${pot} + ${bet} + ${bet}) = ${(oddsNeeded * 100).toFixed(0)} %. Ton équité est de ${(heroEquity * 100).toFixed(0)} %. Il faut CALL seulement si ton équité est supérieure à la cote nécessaire.`;
                    return { html: html, btnLeft: "FOLD", btnRight: "CALL", correctAnswer: isWinning ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "SPR",
                instruction: "ÉVALUE LE SPR !",
                setup: function() {
                    const pot = Math.floor(Math.random() * 50) + 10;
                    const isLow = Math.random() > 0.5;
                    let spr = isLow ? (Math.random() * 2 + 0.5) : (Math.random() * 10 + 6);
                    const stack = Math.floor(pot * spr);

                    const html = `
                        <div class="flex gap-4 w-full">
                            <div class="flex-1 bg-slate-800 p-4 rounded-xl border-2 border-amber-500 flex flex-col items-center justify-center">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Pot</p>
                                <p class="text-4xl font-black text-white">${pot}</p>
                            </div>
                            <div class="flex-1 bg-slate-800 p-4 rounded-xl border-2 border-emerald-500 flex flex-col items-center justify-center">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Stack</p>
                                <p class="text-4xl font-black text-white">${stack}</p>
                            </div>
                        </div>
                    `;
                    const explanation = `SPR = Stack / Pot = ${stack} / ${pot} = ${(stack / pot).toFixed(1)}. Ici, c’est ${isLow ? "un SPR bas : moins de 3" : "un SPR haut : plus de 6"}.`;
                    return { html: html, btnLeft: "LOW (<3)", btnRight: "HIGH (>6)", correctAnswer: isLow ? "btn-left" : "btn-right", explanation: explanation };
                }
            },
            {
                name: "FlushDraw",
                instruction: "TIRAGE COULEUR ?",
                setup: function() {
                    const hasDraw = Math.random() > 0.5;
                    let board;
                    const deck = createDeck();

                    if (hasDraw) {
                        const targetSuit = randomItem(CARD_SUITS);
                        const first = pickAndRemove(deck, c => c.suit === targetSuit);
                        const second = pickAndRemove(deck, c => c.suit === targetSuit);
                        const third = pickAndRemove(deck, c => c.suit !== targetSuit);
                        board = shuffle([first, second, third]);
                    } else {
                        const threeSuits = shuffle(CARD_SUITS).slice(0, 3);
                        board = shuffle(threeSuits.map(suit => pickAndRemove(deck, c => c.suit === suit)));
                    }

                    const html = cardGroupHtml("Flop", board);
                    const explanation = hasDraw
                        ? "Deux cartes du flop sont de la même couleur : un joueur peut donc avoir un tirage couleur avec deux cartes de cette couleur en main."
                        : "Les trois cartes du flop sont de couleurs différentes : pas de tirage couleur immédiat au flop.";
                    return { html: html, btnLeft: "NON", btnRight: "OUI", correctAnswer: hasDraw ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "FlopTexture",
                instruction: "WET OU DRY ?",
                setup: function() {
                    const suits = ['spade', 'heart', 'diamond', 'club'];
                    const symbols = {'spade': '♠', 'heart': '♥', 'diamond': '♦', 'club': '♣'};
                    const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
                    const rVals = {'A':14, 'K':13, 'Q':12, 'J':11, 'T':10, '9':9, '8':8, '7':7, '6':6, '5':5, '4':4, '3':3, '2':2};
                    
                    let deck = [];
                    for(let r of ranks) for(let s of suits) deck.push({rank: r, suit: s, val: rVals[r]});
                    deck.sort(() => Math.random() - 0.5);
                    let flop = deck.slice(0, 3);
                    
                    let sCounts = {}; let hasFD = false;
                    flop.forEach(c => { sCounts[c.suit] = (sCounts[c.suit]||0)+1; if(sCounts[c.suit]>=2) hasFD=true; });
                    
                    let vals = flop.map(c => c.val).sort((a,b)=>a-b);
                    let isConn = (vals[2] - vals[0] <= 4) || (vals[2]===14 && vals[0]===2 && vals[1]<=5);
                    let isWet = hasFD || isConn;

                    const html = `
                        <div class="flex gap-3 justify-center w-full bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-inner">
                            ${flop.map(c => `<div class="card w-16 h-24 text-3xl ${c.suit} border-2 border-slate-200">${c.rank}${symbols[c.suit]}</div>`).join('')}
                        </div>
                    `;
                    const explanation = isWet
                        ? `Board WET : ${hasFD ? "il y a un tirage couleur possible" : ""}${hasFD && isConn ? " et " : ""}${isConn ? "les cartes sont connectées" : ""}.`
                        : "Board DRY : pas de tirage couleur évident et cartes peu connectées.";
                    return { html: html, btnLeft: "DRY", btnRight: "WET", correctAnswer: isWet ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "StackToBB",
                instruction: "COMBIEN DE BB ?",
                setup: function() {
                    const blvl = [100, 200, 400, 500, 1000, 2000, 5000, 10000];
                    const bb = blvl[Math.floor(Math.random() * blvl.length)];
                    const isLow = Math.random() > 0.5;
                    let sInBB = isLow ? (Math.random() * 10 + 5) : (Math.random() * 40 + 25);
                    let stack = Math.floor(sInBB * bb);

                    const html = `
                        <div class="bg-slate-800 p-6 rounded-xl border-2 border-slate-600 w-full text-center shadow-lg">
                            <p class="text-slate-400 text-sm font-bold uppercase mb-2">Blindes : <span class="text-white">${bb/2}/${bb}</span></p>
                            <div class="p-4 bg-slate-900 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold mb-1">Tapis (Jetons)</p>
                                <p class="text-4xl text-amber-400 font-black">${stack.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                    const explanation = `Nombre de BB = tapis / grosse blinde = ${stack.toLocaleString()} / ${bb} = ${(stack / bb).toFixed(1)} BB. La bonne réponse est donc ${isLow ? "< 20 BB" : "> 20 BB"}.`;
                    return { html: html, btnLeft: "< 20 BB", btnRight: "> 20 BB", correctAnswer: isLow ? "btn-left" : "btn-right", explanation: explanation };
                }
            },
            {
                name: "SizingCheck",
                instruction: "QUEL SIZING ?",
                setup: function() {
                    const pots = [30, 60, 90, 120, 150, 240, 300];
                    const pot = pots[Math.floor(Math.random() * pots.length)];
                    const isOneThird = Math.random() > 0.5;
                    const bet = isOneThird ? (pot / 3) : (pot / 2);

                    const html = `
                        <div class="flex gap-4 w-full">
                            <div class="flex-1 bg-slate-800 p-4 rounded-xl border-2 border-slate-500 flex flex-col items-center justify-center">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Pot</p>
                                <p class="text-4xl font-black text-white">${pot}</p>
                            </div>
                            <div class="flex-1 bg-slate-800 p-4 rounded-xl border-2 border-red-500 flex flex-col items-center justify-center">
                                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Mise</p>
                                <p class="text-4xl font-black text-red-400">${bet}</p>
                            </div>
                        </div>
                    `;
                    const explanation = `La mise est de ${bet} pour un pot de ${pot}. ${pot} / 3 = ${(pot / 3).toFixed(0)} et ${pot} / 2 = ${(pot / 2).toFixed(0)}. C’est donc ${isOneThird ? "1/3 pot" : "1/2 pot"}.`;
                    return { html: html, btnLeft: "1/3 POT", btnRight: "1/2 POT", correctAnswer: isOneThird ? "btn-left" : "btn-right", explanation: explanation };
                }
            },
            {
                name: "TopPair",
                instruction: "TOP PAIR ?",
                setup: function() {
                    const hasTopPair = Math.random() > 0.5;
                    const deck = createDeck();
                    let hero;
                    let flop;

                    if (hasTopPair) {
                        const topValue = Math.floor(Math.random() * 7) + 8;
                        const topRank = rankFromValue(topValue);
                        const lowerRanks = CARD_RANKS.filter(rank => CARD_VALUES[rank] < topValue);

                        flop = [
                            pickAndRemove(deck, c => c.rank === topRank),
                            pickAndRemove(deck, c => lowerRanks.includes(c.rank)),
                            pickAndRemove(deck, c => lowerRanks.includes(c.rank))
                        ];
                        hero = [
                            pickAndRemove(deck, c => c.rank === topRank),
                            pickAndRemove(deck, c => c.rank !== topRank)
                        ];
                    } else {
                        flop = [pickAndRemove(deck), pickAndRemove(deck), pickAndRemove(deck)];
                        const boardHigh = Math.max(...flop.map(c => c.val));
                        hero = [
                            pickAndRemove(deck, c => c.val !== boardHigh),
                            pickAndRemove(deck, c => c.val !== boardHigh)
                        ];
                    }

                    flop = shuffle(flop);
                    hero = shuffle(hero);
                    const html = `<div class="space-y-4 w-full">${cardGroupHtml("Ta main", hero)}${cardGroupHtml("Flop", flop)}</div>`;
                    const boardHigh = Math.max(...flop.map(c => c.val));
                    const explanation = hasTopPair
                        ? "Tu as une carte qui fait paire avec la plus haute carte du flop. C’est top pair."
                        : `La plus haute carte du flop vaut ${rankFromValue(boardHigh)}. Aucune de tes cartes ne fait paire avec cette carte haute.`;
                    return { html: html, btnLeft: "NON", btnRight: "OUI", correctAnswer: hasTopPair ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "PairedBoard",
                instruction: "BOARD PAIRÉ ?",
                setup: function() {
                    const isPaired = Math.random() > 0.5;
                    const deck = createDeck();
                    let flop;

                    if (isPaired) {
                        const pairRank = randomItem(CARD_RANKS);
                        flop = [
                            pickAndRemove(deck, c => c.rank === pairRank),
                            pickAndRemove(deck, c => c.rank === pairRank),
                            pickAndRemove(deck, c => c.rank !== pairRank)
                        ];
                    } else {
                        const ranks = shuffle(CARD_RANKS).slice(0, 3);
                        flop = ranks.map(rank => pickAndRemove(deck, c => c.rank === rank));
                    }

                    flop = shuffle(flop);
                    const html = cardGroupHtml("Flop", flop);
                    const explanation = isPaired
                        ? "Deux cartes du flop ont la même valeur : le board est pairé."
                        : "Les trois cartes du flop ont des valeurs différentes : le board n’est pas pairé.";
                    return { html: html, btnLeft: "NON", btnRight: "OUI", correctAnswer: isPaired ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "Overcard",
                instruction: "OVERCARD ?",
                setup: function() {
                    const hasOvercard = Math.random() > 0.5;
                    const deck = createDeck();
                    let flop;
                    let hero;
                    const boardHighValue = hasOvercard
                        ? Math.floor(Math.random() * 6) + 7
                        : Math.floor(Math.random() * 6) + 9;
                    const boardHighRank = rankFromValue(boardHighValue);
                    const lowerOrEqualRanks = CARD_RANKS.filter(rank => CARD_VALUES[rank] <= boardHighValue);
                    const lowerRanks = CARD_RANKS.filter(rank => CARD_VALUES[rank] < boardHighValue);
                    const higherRanks = CARD_RANKS.filter(rank => CARD_VALUES[rank] > boardHighValue);

                    flop = [
                        pickAndRemove(deck, c => c.rank === boardHighRank),
                        pickAndRemove(deck, c => lowerRanks.includes(c.rank)),
                        pickAndRemove(deck, c => lowerRanks.includes(c.rank))
                    ];

                    if (hasOvercard) {
                        hero = [
                            pickAndRemove(deck, c => higherRanks.includes(c.rank)),
                            pickAndRemove(deck, c => c.rank !== boardHighRank)
                        ];
                    } else {
                        hero = [
                            pickAndRemove(deck, c => lowerOrEqualRanks.includes(c.rank)),
                            pickAndRemove(deck, c => lowerOrEqualRanks.includes(c.rank))
                        ];
                    }

                    flop = shuffle(flop);
                    hero = shuffle(hero);
                    const html = `<div class="space-y-4 w-full">${cardGroupHtml("Ta main", hero)}${cardGroupHtml("Flop", flop)}</div>`;
                    const explanation = hasOvercard
                        ? `Au moins une de tes cartes est plus haute que la plus haute carte du flop (${boardHighRank}). Tu as donc une overcard.`
                        : `Aucune de tes cartes n’est plus haute que la plus haute carte du flop (${boardHighRank}).`;
                    return { html: html, btnLeft: "NON", btnRight: "OUI", correctAnswer: hasOvercard ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "SuitedHand",
                instruction: "SUITED OU OFFSUIT ?",
                setup: function() {
                    const isSuited = Math.random() > 0.5;
                    const deck = createDeck();
                    let hero;

                    if (isSuited) {
                        const suit = randomItem(CARD_SUITS);
                        hero = [
                            pickAndRemove(deck, c => c.suit === suit),
                            pickAndRemove(deck, c => c.suit === suit)
                        ];
                    } else {
                        const suits = shuffle(CARD_SUITS).slice(0, 2);
                        hero = [
                            pickAndRemove(deck, c => c.suit === suits[0]),
                            pickAndRemove(deck, c => c.suit === suits[1])
                        ];
                    }

                    const html = cardGroupHtml("Ta main", hero);
                    const explanation = isSuited
                        ? "Tes deux cartes sont de la même couleur : la main est suited."
                        : "Tes deux cartes sont de couleurs différentes : la main est offsuit.";
                    return { html: html, btnLeft: "OFFSUIT", btnRight: "SUITED", correctAnswer: isSuited ? "btn-right" : "btn-left", explanation: explanation };
                }
            },
            {
                name: "OutsCount",
                instruction: "COMBIEN D'OUTS ?",
                setup: function() {
                    const isFlushDraw = Math.random() > 0.5;
                    const deck = createDeck();
                    let hero;
                    let flop;
                    let explanation;

                    if (isFlushDraw) {
                        const suit = randomItem(CARD_SUITS);
                        hero = [
                            pickAndRemove(deck, c => c.suit === suit),
                            pickAndRemove(deck, c => c.suit === suit)
                        ];
                        flop = [
                            pickAndRemove(deck, c => c.suit === suit),
                            pickAndRemove(deck, c => c.suit === suit),
                            pickAndRemove(deck, c => c.suit !== suit)
                        ];
                        explanation = "Tirage couleur : 13 cartes dans une couleur, 4 déjà visibles entre ta main et le flop. Il reste donc 9 outs.";
                    } else {
                        hero = [
                            pickAndRemove(deck, c => c.rank === "6" && c.suit === "club"),
                            pickAndRemove(deck, c => c.rank === "7" && c.suit === "diamond")
                        ];
                        flop = [
                            pickAndRemove(deck, c => c.rank === "9" && c.suit === "spade"),
                            pickAndRemove(deck, c => c.rank === "T" && c.suit === "heart"),
                            pickAndRemove(deck, c => c.rank === "A" && c.suit === "club")
                        ];
                        explanation = "Tirage quinte ventral : seule une carte de rang 8 complète la quinte 6-7-8-9-T. Il y a 4 huit dans le paquet, donc 4 outs.";
                    }

                    hero = shuffle(hero);
                    flop = shuffle(flop);
                    const html = `<div class="space-y-4 w-full">${cardGroupHtml("Ta main", hero)}${cardGroupHtml("Flop", flop)}</div>`;
                    return { html: html, btnLeft: "4 OUTS", btnRight: "9 OUTS", correctAnswer: isFlushDraw ? "btn-right" : "btn-left", explanation: explanation };
                }
            }
        ];

        // --- MOTEUR DE JEU ---

        function updateUI() {
            document.getElementById('score-display').textContent = Math.round(score);
            document.getElementById('mode-display').textContent = currentMode.label;

            if (!currentMode.loseLife) {
                document.getElementById('lives-display').innerHTML = "∞";
                return;
            }

            let livesHtml = "";
            for(let i=0; i<3; i++) livesHtml += i < lives ? "❤️" : "🖤";
            document.getElementById('lives-display').innerHTML = livesHtml;
        }

        function updateModeButtons() {
            document.querySelectorAll('.mode-option').forEach(button => {
                const isSelected = button.dataset.mode === selectedMode;
                button.className = isSelected
                    ? "mode-option border-2 border-emerald-400 bg-emerald-500/20 text-white rounded-xl p-3 font-black uppercase text-sm"
                    : "mode-option border-2 border-slate-600 bg-slate-800 text-slate-300 rounded-xl p-3 font-black uppercase text-sm";
            });

            const help = document.getElementById('mode-help');
            if (help) help.textContent = GAME_MODES[selectedMode].help;
        }

        function calculateWinPoints() {
            if (!currentMode.timer || !maxTime) return 10;

            const remainingRatio = Math.max(0, Math.min(1, currentTimer / maxTime));
            const basePoints = 10 + remainingRatio * 90;

            // Plus le timer est court, plus la même seconde restante vaut cher.
            // Exemple : 1s restante sur 2s rapporte beaucoup plus que 1s restante sur 7s.
            const referenceTime = GAME_MODES.normal.maxTime;
            const difficultyMultiplier = Math.max(0.6, Math.min(2.5, referenceTime / maxTime));

            return Math.round(basePoints * difficultyMultiplier);
        }

        function flashScreen(type) {
            flashOverlay.className = `absolute inset-0 z-0 pointer-events-none flash-${type === 'win' ? 'green' : 'red'}`;
            setTimeout(() => { flashOverlay.className = "absolute inset-0 z-0 pointer-events-none"; }, 300);
        }

        function getCorrectAnswerLabel() {
            if (!currentGame) return "";
            return currentGame.correctAnswer === "btn-left" ? currentGame.btnLeft : currentGame.btnRight;
        }

        function showErrorExplanation() {
            const nextLabel = lives <= 0 ? "VOIR LE SCORE" : "QUESTION SUIVANTE";
            document.getElementById('game-content').innerHTML = `
                <div class="w-full bg-slate-800 border-2 border-red-500 rounded-2xl p-5 text-center shadow-lg">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-2">Bonne réponse</p>
                    <p class="text-3xl font-black text-emerald-400 mb-4">${getCorrectAnswerLabel()}</p>
                    <p class="text-base text-slate-100 leading-relaxed mb-5">${currentGame?.explanation || "Reprends le calcul calmement avant de passer à la suite."}</p>
                    <button id="btn-next-after-error" class="w-full bg-emerald-500 text-slate-900 font-black text-xl px-6 py-4 rounded-xl shadow-[0_5px_0_rgb(5,150,105)] active:translate-y-1 active:shadow-none transition-all">${nextLabel}</button>
                </div>
            `;

            document.getElementById('btn-next-after-error').addEventListener('click', () => {
                if (lives <= 0) endGame();
                else nextMiniGame();
            });
        }

        function showResultAndNext(isWin) {
            isPlaying = false;
            clearInterval(timerInterval);
            
            if (isWin) {
                const points = calculateWinPoints();
                score += points;
                correctAnswers++;
                if (currentMode.timer && Math.round(maxTime) <= 1000) {
                    minTimerCorrectAnswers++;
                }
                playSound('win');
                flashScreen('win');
                document.getElementById('instruction-text').textContent = `BIEN ! +${points} PTS`;
                document.getElementById('instruction-text').className = "text-5xl font-black text-emerald-400 uppercase tracking-widest text-center mb-6 drop-shadow-[0_0_15px_rgba(16,185,129,0.8)]";
                
                if (currentMode.timer && currentMode.speedEvery > 0 && correctAnswers > 0 && correctAnswers % currentMode.speedEvery === 0) {
                    maxTime = Math.max(currentMode.minTime, maxTime * currentMode.speedFactor);
                    playSound('speedup');
                    document.getElementById('instruction-text').textContent = "PLUS VITE !";
                    document.getElementById('instruction-text').className = "text-5xl font-black text-yellow-400 uppercase tracking-widest text-center mb-6 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]";
                }
            } else {
                if (currentMode.loseLife) lives--;
                playSound('lose');
                flashScreen('lose');
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 300);
                document.getElementById('instruction-text').textContent = "FAUX !";
                document.getElementById('instruction-text').className = "text-5xl font-black text-red-500 uppercase tracking-widest text-center mb-6 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]";
            }

            updateUI();

            if (!isWin) {
                showErrorExplanation();
                return;
            }

            setTimeout(nextMiniGame, 1000);
        }

        function handleInput(btnId) {
            if (!isPlaying || !currentGame) return;
            if (btnId === currentGame.correctAnswer) showResultAndNext(true);
            else showResultAndNext(false);
        }

        function nextMiniGame() {
            const availableGames = microGames.filter(game => currentMode.games.includes(game.name));
            const gameDef = availableGames[Math.floor(Math.random() * availableGames.length)];
            currentGame = gameDef.setup();

            document.getElementById('instruction-text').className = "text-3xl md:text-5xl font-black text-white uppercase tracking-widest text-center mb-6 drop-shadow-lg";
            document.getElementById('instruction-text').textContent = gameDef.instruction;
            document.getElementById('game-content').innerHTML = currentGame.html;
            
            document.getElementById('btn-left').textContent = currentGame.btnLeft;
            document.getElementById('btn-right').textContent = currentGame.btnRight;

            isPlaying = true;
            clearInterval(timerInterval);

            if (!currentMode.timer) {
                timerBar.style.width = "100%";
                timerBar.className = "h-full bg-sky-500 w-full shadow-[0_0_10px_rgba(14,165,233,0.8)]";
                return;
            }

            currentTimer = maxTime;
            timerBar.style.width = "100%";
            timerBar.className = "h-full bg-emerald-500 w-full shadow-[0_0_10px_rgba(16,185,129,0.8)]";
            let lastTime = performance.now();
            
            timerInterval = setInterval(() => {
                let now = performance.now();
                currentTimer -= (now - lastTime);
                lastTime = now;

                if (currentTimer <= 0) {
                    currentTimer = 0;
                    showResultAndNext(false);
                } else {
                    const pct = (currentTimer / maxTime) * 100;
                    timerBar.style.width = pct + "%";
                    if (pct < 30) timerBar.className = "h-full bg-red-500 w-full shadow-[0_0_10px_rgba(239,68,68,0.8)] transition-none";
                    else if (pct < 60) timerBar.className = "h-full bg-amber-400 w-full shadow-[0_0_10px_rgba(251,191,36,0.8)] transition-none";
                }
            }, 16);
        }

        function startGame() {
            Tone.start();
            initAudio();
            currentMode = GAME_MODES[selectedMode];
            document.getElementById('menu-overlay').classList.add('hidden');
            document.getElementById('stats-box').classList.add('hidden');
            score = 0;
            correctAnswers = 0;
            minTimerCorrectAnswers = 0;
            lives = currentMode.lives;
            maxTime = currentMode.maxTime || 4000;
            updateUI();
            nextMiniGame();
        }

        function endGame() {
            document.getElementById('menu-overlay').classList.remove('hidden');
            document.getElementById('menu-title').textContent = "GAME OVER";
            document.getElementById('menu-title').className = "text-5xl md:text-7xl font-black mb-2 text-red-500 uppercase tracking-widest drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]";
            document.getElementById('menu-subtitle').textContent = "Ton cerveau a fondu.";
            document.getElementById('stats-box').classList.remove('hidden');
            document.getElementById('final-score').textContent = Math.round(score);
            const levelAdvice = document.getElementById('level-advice');
            if (minTimerCorrectAnswers > 2) {
                levelAdvice.textContent = "Tu as tenu plus de 2 bonnes réponses avec le timer à 1 seconde : il faut passer au niveau au-dessus.";
                levelAdvice.classList.remove('hidden');
            } else {
                levelAdvice.textContent = "";
                levelAdvice.classList.add('hidden');
            }
            document.getElementById('btn-start').textContent = "REJOUER";
        }

        document.getElementById('btn-start').addEventListener('click', startGame);

        document.querySelectorAll('.mode-option').forEach(button => {
            button.addEventListener('click', () => {
                selectedMode = button.dataset.mode;
                currentMode = GAME_MODES[selectedMode];
                updateModeButtons();
                updateUI();
            });
        });

        updateModeButtons();
        updateUI();
        
        ['btn-left', 'btn-right'].forEach(id => {
            const btn = document.getElementById(id);
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(id); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(id); }, {passive: false});
        });

        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.key === 'ArrowLeft') handleInput('btn-left');
            if (e.key === 'ArrowRight') handleInput('btn-right');
        });

    </script>
</body>
</html>
